<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Guard - Fraud Detection Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 1em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* Review Input Section */
        .review-input {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .review-input h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Section */
        .results-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .results-section h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .result-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .result-card.fraud {
            border-color: #ff4757;
            background: #fff5f5;
        }

        .result-card.legit {
            border-color: #00d25b;
            background: #f0fff4;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .review-id {
            font-size: 0.9em;
            color: #666;
        }

        .score {
            font-size: 1.2em;
            font-weight: bold;
        }

        .score.high {
            color: #ff4757;
        }

        .score.low {
            color: #00d25b;
        }

        .review-text {
            margin: 10px 0;
            color: #333;
            line-height: 1.5;
        }

        .explanation {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #666;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-badge.quarantined {
            background: #ff4757;
            color: white;
        }

        .status-badge.approved {
            background: #00d25b;
            color: white;
        }

        /* Batch Test Section */
        .batch-test {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .batch-test h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .batch-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Drift Status */
        .drift-status {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .drift-card {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .drift-card.drift-detected {
            background: #ff4757;
            color: white;
        }

        .drift-card.no-drift {
            background: #00d25b;
            color: white;
        }

        .drift-value {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .batch-controls {
                grid-template-columns: 1fr;
            }
        }

        /* Error Message */
        .error-message {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        /* Success Message */
        .success-message {
            background: #00d25b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛡️ Review Guard</h1>
            <p>AI-Powered Fraudulent Review Detection System</p>
            
            <div class="stats-container" id="stats">
                <div class="stat-card">
                    <h3>Total Reviews</h3>
                    <div class="number" id="totalReviews">0</div>
                </div>
                <div class="stat-card">
                    <h3>Fraud Detected</h3>
                    <div class="number" id="fraudCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Legitimate</h3>
                    <div class="number" id="legitCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Fraud Rate</h3>
                    <div class="number" id="fraudRate">0%</div>
                </div>
            </div>
        </div>

        <!-- Error/Success Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Review Input -->
            <div class="review-input">
                <h2>📝 Submit Review</h2>
                <form id="reviewForm">
                    <div class="form-group">
                        <label for="reviewText">Review Text:</label>
                        <textarea id="reviewText" placeholder="Write your review here..." required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="userId">User ID:</label>
                        <input type="number" id="userId" value="123" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="rating">Rating:</label>
                        <select id="rating">
                            <option value="1">⭐ 1 Star</option>
                            <option value="2">⭐⭐ 2 Stars</option>
                            <option value="3">⭐⭐⭐ 3 Stars</option>
                            <option value="4">⭐⭐⭐⭐ 4 Stars</option>
                            <option value="5" selected>⭐⭐⭐⭐⭐ 5 Stars</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn" id="submitBtn">Analyze Review</button>
                </form>
                
                <div class="spinner" id="submitSpinner"></div>
            </div>

            <!-- Results -->
            <div class="results-section">
                <h2>📊 Latest Results</h2>
                <div id="results"></div>
            </div>
        </div>

        <!-- Batch Test -->
        <div class="batch-test">
            <h2>🧪 Batch Test</h2>
            <div class="batch-controls">
                <button class="btn" onclick="testBatch('fraud')">Test Fraud Review</button>
                <button class="btn" onclick="testBatch('legit')">Test Legit Review</button>
                <button class="btn" onclick="testBatch('mixed')">Test Mixed Batch</button>
                <button class="btn" onclick="clearResults()">Clear Results</button>
            </div>
            <div class="spinner" id="batchSpinner"></div>
        </div>

        <!-- Drift Status -->
        <div class="drift-status">
            <h2>📈 Drift Monitoring</h2>
            <div id="driftInfo">
                <div class="drift-card no-drift" id="driftCard">
                    <h3>Current Status</h3>
                    <div class="drift-value" id="driftValue">No Drift</div>
                    <p id="driftPValue">p-value: 1.000</p>
                    <p id="samplesAnalyzed">Samples: 0</p>
                </div>
            </div>
            <button class="btn" onclick="checkDrift()" style="margin-top: 20px;">Refresh Drift Status</button>
        </div>
    </div>

    <script>
        // API URL
        const API_URL = 'http://localhost:8000';

        // Sample reviews for testing
        const sampleReviews = {
            fraud: "best ever best ever best ever best ever amazing amazing 5 stars 5 stars best product ever best ever best ever best ever",
            legit: "This product works as expected. Good value for money. Delivery was fast. I'm satisfied with my purchase.",
            mixed: "Okay product for the price. Does the job but nothing special. Could be better."
        };

        // Stats
        let stats = {
            total: 0,
            fraud: 0,
            legit: 0
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkHealth();
            checkDrift();
            loadStats();
        });

        // Check API health
        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/api/health`);
                const data = await response.json();
                
                if (data.database && data.redis) {
                    showSuccess('✅ Connected to MongoDB and Redis');
                } else {
                    showWarning('⚠️ Running without database/redis');
                }
            } catch (error) {
                showError('❌ Cannot connect to API. Make sure FastAPI is running!');
            }
        }

        // Submit single review
        document.getElementById('reviewForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const text = document.getElementById('reviewText').value;
            const user_id = parseInt(document.getElementById('userId').value);
            const rating = parseInt(document.getElementById('rating').value);
            
            if (!text) {
                showError('Please enter review text');
                return;
            }
            
            showLoading('submit');
            
            try {
                const response = await fetch(`${API_URL}/api/reviews/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        user_id: user_id,
                        rating: rating
                    })
                });
                
                const data = await response.json();
                hideLoading('submit');
                
                if (response.ok) {
                    showSuccess('Review analyzed successfully!');
                    addResult(data);
                    updateStats(data);
                    document.getElementById('reviewText').value = '';
                } else {
                    showError('Error analyzing review');
                }
            } catch (error) {
                hideLoading('submit');
                showError('Network error. Make sure API is running!');
            }
        });

        // Test batch
        async function testBatch(type) {
            let reviews = [];
            
            if (type === 'fraud') {
                reviews = [
                    { text: sampleReviews.fraud, user_id: 999, rating: 5 }
                ];
            } else if (type === 'legit') {
                reviews = [
                    { text: sampleReviews.legit, user_id: 111, rating: 4 }
                ];
            } else {
                reviews = [
                    { text: sampleReviews.fraud, user_id: 999, rating: 5 },
                    { text: sampleReviews.legit, user_id: 111, rating: 4 },
                    { text: sampleReviews.mixed, user_id: 222, rating: 3 }
                ];
            }
            
            showLoading('batch');
            
            try {
                const response = await fetch(`${API_URL}/api/reviews/detect/batch`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ reviews: reviews })
                });
                
                const data = await response.json();
                hideLoading('batch');
                
                if (response.ok) {
                    showSuccess(`Batch test complete! ${data.results.length} reviews processed`);
                    data.results.forEach(result => addResult(result));
                    
                    // Update stats
                    data.results.forEach(r => {
                        if (r.score > 0.7) stats.fraud++;
                        else stats.legit++;
                    });
                    stats.total += data.results.length;
                    updateStatsDisplay();
                } else {
                    showError('Error in batch test');
                }
            } catch (error) {
                hideLoading('batch');
                showError('Network error. Make sure API is running!');
            }
        }

        // Add result to display
        function addResult(result) {
            const resultsDiv = document.getElementById('results');
            const isFraud = result.score > 0.7;
            
            const resultCard = document.createElement('div');
            resultCard.className = `result-card ${isFraud ? 'fraud' : 'legit'}`;
            
            const scoreClass = isFraud ? 'high' : 'low';
            
            resultCard.innerHTML = `
                <div class="result-header">
                    <span class="review-id">ID: ${result.review_id.substring(0, 8)}...</span>
                    <span class="score ${scoreClass}">Score: ${(result.score * 100).toFixed(1)}%</span>
                </div>
                <div class="review-text">${result.text || 'Review text'}</div>
                ${result.explanation && result.explanation.length > 0 ? 
                    `<div class="explanation">⚠️ ${result.explanation.join(', ')}</div>` : 
                    '<div class="explanation">✅ No issues detected</div>'}
                <div class="status-badge ${result.status}">${result.status.toUpperCase()}</div>
            `;
            
            resultsDiv.insertBefore(resultCard, resultsDiv.firstChild);
            
            // Keep only last 10 results
            while (resultsDiv.children.length > 10) {
                resultsDiv.removeChild(resultsDiv.lastChild);
            }
        }

        // Check drift status
        async function checkDrift() {
            try {
                const response = await fetch(`${API_URL}/api/drift/status`);
                const data = await response.json();
                
                const driftCard = document.getElementById('driftCard');
                const driftValue = document.getElementById('driftValue');
                const driftPValue = document.getElementById('driftPValue');
                const samplesAnalyzed = document.getElementById('samplesAnalyzed');
                
                if (data.drift_detected) {
                    driftCard.className = 'drift-card drift-detected';
                    driftValue.textContent = 'DRIFT DETECTED!';
                    driftPValue.textContent = `p-value: ${data.current_p_value.toFixed(4)}`;
                } else {
                    driftCard.className = 'drift-card no-drift';
                    driftValue.textContent = 'No Drift';
                    driftPValue.textContent = `p-value: ${data.current_p_value.toFixed(4)}`;
                }
                
                samplesAnalyzed.textContent = `Samples: ${data.samples_analyzed}`;
                
                if (data.recent_drifts > 0) {
                    driftPValue.innerHTML += `<br>⚠️ ${data.recent_drifts} drifts in last 24h`;
                }
            } catch (error) {
                console.error('Error checking drift:', error);
            }
        }

        // Load stats
        function loadStats() {
            // This would ideally fetch from API
            // For now, just initialize
            updateStatsDisplay();
        }

        // Update stats
        function updateStats(result) {
            if (result.score > 0.7) {
                stats.fraud++;
            } else {
                stats.legit++;
            }
            stats.total++;
            updateStatsDisplay();
        }

        function updateStatsDisplay() {
            document.getElementById('totalReviews').textContent = stats.total;
            document.getElementById('fraudCount').textContent = stats.fraud;
            document.getElementById('legitCount').textContent = stats.legit;
            
            const fraudRate = stats.total > 0 ? ((stats.fraud / stats.total) * 100).toFixed(1) : 0;
            document.getElementById('fraudRate').textContent = fraudRate + '%';
        }

        // Clear results
        function clearResults() {
            document.getElementById('results').innerHTML = '';
            stats = { total: 0, fraud: 0, legit: 0 };
            updateStatsDisplay();
            showSuccess('Results cleared');
        }

        // Loading spinner
        function showLoading(type) {
            if (type === 'submit') {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitSpinner').style.display = 'block';
            } else {
                document.getElementById('batchSpinner').style.display = 'block';
            }
        }

        function hideLoading(type) {
            if (type === 'submit') {
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitSpinner').style.display = 'none';
            } else {
                document.getElementById('batchSpinner').style.display = 'none';
            }
        }

        // Messages
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function showWarning(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.background = '#ffa500';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
                errorDiv.style.background = '#ff4757';
            }, 5000);
        }
    </script>
</body>
</html>
